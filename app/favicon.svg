<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Siyah arka plan (yumuşak köşeli) -->
  <rect width="120" height="120" rx="24" fill="#0a0a0a" />
  
  <!-- Dış şeritli çerçeve (tam çevreliyor) -->
  <rect x="3" y="3" width="114" height="114" rx="21" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="10 8" />
  
  <!-- Orta çerçeve -->
  <rect x="9" y="9" width="102" height="102" rx="16" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4" />
  
  <!-- İç çerçeve -->
  <rect x="15" y="15" width="90" height="90" rx="12" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.2" />
  
  <!-- Ana B harfi (mavi, ortada) -->
  <text x="60" y="82" font-family="'Inter', Arial, sans-serif" font-weight="900" font-size="64" fill="#3b82f6" text-anchor="middle">B</text>
  
  <!-- P harfi (beyaz, B'nin sağ üstünde, ayrı) -->
  <text x="86" y="40" font-family="'Inter', Arial, sans-serif" font-weight="800" font-size="30" fill="#ffffff" text-anchor="middle">P</text>
</svg>