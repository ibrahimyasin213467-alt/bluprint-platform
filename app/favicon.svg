<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  
  <!-- Arka plan -->
  <rect width="100" height="100" rx="20" fill="#0a0f1a" />
  
  <!-- Parlaklık efekti -->
  <rect x="0" y="0" width="100" height="100" rx="20" fill="url(#grad)" opacity="0.15" />
  
  <!-- B harfi (BluPrint'in B'si) -->
  <text x="50" y="72" font-family="'Inter', sans-serif" font-weight="800" font-size="60" fill="#3b82f6" text-anchor="middle" dominant-baseline="middle">
    B
  </text>
  
  <!-- Küçük P (Print'in P'si) -->
  <text x="78" y="45" font-family="'Inter', sans-serif" font-weight="800" font-size="22" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
    P
  </text>
</svg>